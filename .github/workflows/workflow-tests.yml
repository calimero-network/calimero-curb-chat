# Run merobox workflow tests when logic changes.
# Only triggers on pushes/PRs that modify files under logic/

name: Workflow Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'logic/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'logic/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  workflow-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout calimero/core (Cargo path deps)
        run: git clone --depth 1 https://github.com/calimero-network/core.git "${GITHUB_WORKSPACE}/../core"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
          targets: wasm32-unknown-unknown

      - name: Build curb WASM
        run: |
          cd logic
          cargo build --target wasm32-unknown-unknown --profile app-release
          mkdir -p res
          cp target/wasm32-unknown-unknown/app-release/curb.wasm res/

      - name: Install merobox
        run: pip install merobox==0.4.6

      - name: Verify merobox installation
        run: merobox --version

      - name: Run E2E workflow
        working-directory: workflows
        run: |
          max_attempts=2
          attempt=1
          success=false
          while [ $attempt -le $max_attempts ]; do
            if [ $attempt -gt 1 ]; then
              merobox stop --all || true
              merobox nuke --force || true
              sleep 2
            fi
            if merobox bootstrap run e2e.yml; then
              success=true
              break
            fi
            attempt=$((attempt + 1))
          done
          merobox stop --all || true
          merobox nuke --force || true
          if [ "$success" = false ]; then exit 1; fi

      - name: Run integration-setup workflow
        working-directory: workflows
        run: |
          max_attempts=2
          attempt=1
          success=false
          while [ $attempt -le $max_attempts ]; do
            if [ $attempt -gt 1 ]; then
              merobox stop --all || true
              merobox nuke --force || true
              sleep 2
            fi
            if merobox bootstrap run integration-setup.yml; then
              success=true
              break
            fi
            attempt=$((attempt + 1))
          done
          merobox stop --all || true
          merobox nuke --force || true
          if [ "$success" = false ]; then exit 1; fi
