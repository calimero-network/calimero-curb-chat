# Runs merobox workflow tests when logic or workflow files change.
# Builds curb.wasm, then validates all merobox workflow definitions against
# real merod nodes (e2e.yml = 3-node comprehensive, integration-setup.yml =
# 2-node setup for Playwright).

name: Workflow Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'logic/**'
      - 'workflows/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'logic/**'
      - 'workflows/**'

concurrency:
  group: workflow-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  workflow-tests:
    name: merobox Workflow Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout calimero/core (Cargo path deps)
        run: git clone --depth 1 https://github.com/calimero-network/core.git "${GITHUB_WORKSPACE}/../core"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89.0"
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            logic/target
          key: cargo-${{ runner.os }}-${{ hashFiles('logic/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build curb WASM
        run: |
          cd logic
          cargo build --target wasm32-unknown-unknown --profile app-release
          mkdir -p res
          cp target/wasm32-unknown-unknown/app-release/curb.wasm res/

      - name: Install merobox
        run: pip install merobox==0.6.14 && merobox --version

      - name: Run E2E workflow (3-node)
        working-directory: workflows
        run: |
          max_attempts=2
          attempt=1
          success=false
          while [ $attempt -le $max_attempts ]; do
            if [ $attempt -gt 1 ]; then
              merobox stop --all || true
              merobox nuke --force || true
              sleep 2
            fi
            if merobox bootstrap run e2e.yml; then
              success=true
              break
            fi
            attempt=$((attempt + 1))
          done
          merobox stop --all || true
          merobox nuke --force || true
          [ "$success" = true ] || exit 1

      - name: Run integration-setup workflow (2-node)
        working-directory: workflows
        run: |
          max_attempts=2
          attempt=1
          success=false
          while [ $attempt -le $max_attempts ]; do
            if [ $attempt -gt 1 ]; then
              merobox stop --all || true
              merobox nuke --force || true
              sleep 2
            fi
            if merobox bootstrap run integration-setup.yml; then
              success=true
              break
            fi
            attempt=$((attempt + 1))
          done
          merobox stop --all || true
          merobox nuke --force || true
          [ "$success" = true ] || exit 1
