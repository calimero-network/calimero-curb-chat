name: Complex Invitations Workflow
description: >
  Tests both private (invite_identity/join_context) and open (invite_open/join_open)
  invitation flows in one context with the v2 logic API: Node 2 joins via private
  invite, Nodes 3 and 4 via open invitation. Then set_profile, messaging, and
  sync checks across all nodes.

nodes:
  chain_id: testnet-1
  count: 4
  image: ghcr.io/calimero-network/merod:prerelease
  prefix: calimero-node

steps:
  # ── Bootstrap ──────────────────────────────────────────────────────────────
  - name: Install Application
    type: install_application
    node: calimero-node-1
    path: "../logic/res/curb.wasm"
    dev: true
    outputs:
      app_id: applicationId

  - name: Install Application on Node 2
    type: install_application
    node: calimero-node-2
    path: "../logic/res/curb.wasm"
    dev: true

  - name: Install Application on Node 3
    type: install_application
    node: calimero-node-3
    path: "../logic/res/curb.wasm"
    dev: true

  - name: Install Application on Node 4
    type: install_application
    node: calimero-node-4
    path: "../logic/res/curb.wasm"
    dev: true

  - name: Create Namespace
    type: create_namespace
    node: calimero-node-1
    application_id: "{{app_id}}"
    outputs:
      namespace_id: namespaceId

  - name: Create Context
    type: create_context
    node: calimero-node-1
    application_id: "{{app_id}}"
    group_id: "{{namespace_id}}"
    params: '{"name": "ComplexInviteTest", "context_type": "Channel", "description": "", "created_at": 1751952997}'
    outputs:
      context_id: contextId
      member_public_key: memberPublicKey

  - name: Create Identity on Node 2
    type: create_identity
    node: calimero-node-2
    outputs:
      public_key_2: publicKey

  - name: Create Identity on Node 3
    type: create_identity
    node: calimero-node-3
    outputs:
      public_key_3: publicKey

  - name: Create Identity on Node 4
    type: create_identity
    node: calimero-node-4
    outputs:
      public_key_4: publicKey

  - name: Wait for Identity Setup
    type: wait
    seconds: 5

  # ── Private invitation (Node 2) ─────────────────────────────────────────────
  - name: Invite Node 2 (Private)
    type: invite_identity
    node: calimero-node-1
    namespace_id: "{{namespace_id}}"
    outputs:
      invitation_2: invitation

  - name: Join Context from Node 2
    type: join_namespace
    node: calimero-node-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{invitation_2}}"

  - name: Node 2 joins channel context
    type: join_context
    node: calimero-node-2
    context_id: "{{context_id}}"

  # ── Open invitation (1 invite per node) ─────────────────────────────────────
  - name: Create Open Invitation for Node 3
    type: invite_open
    node: calimero-node-1
    namespace_id: "{{namespace_id}}"
    outputs:
      open_invitation_3: invitation

  - name: Join via Open Invitation - Node 3
    type: join_namespace
    node: calimero-node-3
    namespace_id: "{{namespace_id}}"
    invitation: "{{open_invitation_3}}"

  - name: Node 3 joins channel context
    type: join_context
    node: calimero-node-3
    context_id: "{{context_id}}"

  - name: Create Open Invitation for Node 4
    type: invite_open
    node: calimero-node-1
    namespace_id: "{{namespace_id}}"
    outputs:
      open_invitation_4: invitation

  - name: Join via Open Invitation - Node 4
    type: join_namespace
    node: calimero-node-4
    namespace_id: "{{namespace_id}}"
    invitation: "{{open_invitation_4}}"

  - name: Node 4 joins channel context
    type: join_context
    node: calimero-node-4
    context_id: "{{context_id}}"

  - name: Assert All Joins Succeeded
    type: assert
    statements:
      - "is_set({{invitation_2}})"
      - "is_set({{open_invitation_3}})"
      - "is_set({{open_invitation_4}})"

  - name: Wait for All Nodes to Sync After Joins
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2
      - calimero-node-3
      - calimero-node-4
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── Set profiles ───────────────────────────────────────────────────────────
  - name: Set Profile - Node 2 (Bob)
    type: call
    node: calimero-node-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_2}}"
    method: set_profile
    args:
      username: Bob
      avatar: null

  - name: Set Profile - Node 3 (Charlie)
    type: call
    node: calimero-node-3
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_3}}"
    method: set_profile
    args:
      username: Charlie
      avatar: null

  - name: Set Profile - Node 4 (Dave)
    type: call
    node: calimero-node-4
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_4}}"
    method: set_profile
    args:
      username: Dave
      avatar: null

  - name: Wait for Profile Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2
      - calimero-node-3
      - calimero-node-4
    timeout: 30
    check_interval: 2
    trigger_sync: true

  # ── Verify profiles ────────────────────────────────────────────────────────
  - name: Get Profiles
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_profiles
    outputs:
      profiles: result

  - name: Assert All Four Members Present
    type: assert
    statements:
      - "is_set({{profiles}})"
      - "contains({{profiles}}, 'Bob')"
      - "contains({{profiles}}, 'Charlie')"
      - "contains({{profiles}}, 'Dave')"

  # ── Messaging from all nodes ───────────────────────────────────────────────
  - name: Send Message - Alice
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: send_message
    args:
      message: "Hello from Alice (private + open invite test)"
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751953001
      sender_username: Alice
      files: null
      images: null

  - name: Send Message - Bob
    type: call
    node: calimero-node-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_2}}"
    method: send_message
    args:
      message: "Bob here (joined via private invite)"
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751953002
      sender_username: Bob
      files: null
      images: null

  - name: Send Message - Charlie
    type: call
    node: calimero-node-3
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_3}}"
    method: send_message
    args:
      message: "Charlie here (joined via open invite)"
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751953003
      sender_username: Charlie
      files: null
      images: null

  - name: Send Message - Dave
    type: call
    node: calimero-node-4
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_4}}"
    method: send_message
    args:
      message: "Dave here (also open invite)"
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751953004
      sender_username: Dave
      files: null
      images: null

  - name: Wait for Message Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2
      - calimero-node-3
      - calimero-node-4
    timeout: 30
    check_interval: 2
    trigger_sync: true

  # ── Verify messages on multiple nodes ─────────────────────────────────────
  - name: Get Messages - Node 1
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_messages
    args:
      parent_message: null
      limit: 10
      offset: 0
      search_term: null
    outputs:
      messages_node1: result

  - name: Get Messages - Node 4
    type: call
    node: calimero-node-4
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_4}}"
    method: get_messages
    args:
      parent_message: null
      limit: 10
      offset: 0
      search_term: null
    outputs:
      messages_node4: result

  - name: Assert All Messages Synced
    type: assert
    statements:
      - "contains({{messages_node1}}, 'Hello from Alice')"
      - "contains({{messages_node1}}, 'Bob here')"
      - "contains({{messages_node1}}, 'Charlie here')"
      - "contains({{messages_node1}}, 'Dave here')"
      - "contains({{messages_node4}}, 'Hello from Alice')"
      - "contains({{messages_node4}}, 'Bob here')"
      - "contains({{messages_node4}}, 'Charlie here')"
      - "contains({{messages_node4}}, 'Dave here')"

stop_all_nodes: true
restart: false
wait_timeout: 90
