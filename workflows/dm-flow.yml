name: DM Flow Workflow
description: >
  Tests the DM (direct message) context type with the v2 logic API.
  A DM context uses context_type "Dm" instead of "Channel".
  Verifies context creation, profile setup, messaging, and cross-node sync
  for a two-person DM conversation.

nodes:
  chain_id: testnet-1
  count: 2
  image: ghcr.io/calimero-network/merod:prerelease
  prefix: calimero-node

steps:
  # ── Bootstrap ──────────────────────────────────────────────────────────────
  - name: Install Application
    type: install_application
    node: calimero-node-1
    path: "../logic/res/curb.wasm"
    dev: true
    outputs:
      app_id: applicationId

  - name: Install Application on Node 2
    type: install_application
    node: calimero-node-2
    path: "../logic/res/curb.wasm"
    dev: true

  - name: Create Namespace
    type: create_namespace
    node: calimero-node-1
    application_id: "{{app_id}}"
    outputs:
      namespace_id: namespaceId

  - name: Create DM Context
    type: create_context
    node: calimero-node-1
    application_id: "{{app_id}}"
    group_id: "{{namespace_id}}"
    params: '{"name": "Alice-Bob DM", "context_type": "Dm", "description": "", "created_at": 1751952997}'
    outputs:
      context_id: contextId
      member_public_key: memberPublicKey

  - name: Create Identity on Node 2
    type: create_identity
    node: calimero-node-2
    outputs:
      public_key_2: publicKey

  - name: Wait for Identity Setup
    type: wait
    seconds: 5

  # ── Private Invitation ─────────────────────────────────────────────────────
  - name: Invite Node 2 (Private)
    type: invite_identity
    node: calimero-node-1
    namespace_id: "{{namespace_id}}"
    outputs:
      invitation_2: invitation

  - name: Assert Invitation Created
    type: assert
    statements:
      - "is_set({{invitation_2}})"

  - name: Join Context from Node 2
    type: join_namespace
    node: calimero-node-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{invitation_2}}"

  - name: Wait for Context Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── Verify DM context type ─────────────────────────────────────────────────
  - name: Get Context Info
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_info
    outputs:
      dm_info: result

  - name: Assert context_type is Dm
    type: assert
    statements:
      - "contains({{dm_info}}, 'Dm')"
      - "contains({{dm_info}}, 'Alice-Bob DM')"

  # ── Set Profiles ───────────────────────────────────────────────────────────
  - name: Set Profile - Node 1 (Alice)
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: set_profile
    args:
      username: Alice
      avatar: null

  - name: Set Profile - Node 2 (Bob)
    type: call
    node: calimero-node-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_2}}"
    method: set_profile
    args:
      username: Bob
      avatar: null

  - name: Wait for Profile Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  - name: Get Profiles from Node 2
    type: call
    node: calimero-node-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_2}}"
    method: get_profiles
    outputs:
      profiles: result

  - name: Assert both participants are visible
    type: assert
    statements:
      - "contains({{profiles}}, 'Alice')"
      - "contains({{profiles}}, 'Bob')"

  # ── DM Messaging ──────────────────────────────────────────────────────────
  - name: Send DM - Alice to Bob
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: send_message
    args:
      message: "Hey Bob this is a DM!"
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751953001
      sender_username: Alice
      files: null
      images: null

  - name: Send DM - Bob to Alice
    type: call
    node: calimero-node-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_2}}"
    method: send_message
    args:
      message: "Hi Alice! Got your message."
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751953002
      sender_username: Bob
      files: null
      images: null

  - name: Wait for Message Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  # ── Verify DM messages ─────────────────────────────────────────────────────
  - name: Get Messages - Node 1
    type: call
    node: calimero-node-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_messages
    args:
      parent_message: null
      limit: 10
      offset: 0
      search_term: null
    outputs:
      messages_node1: result

  - name: Get Messages - Node 2
    type: call
    node: calimero-node-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_2}}"
    method: get_messages
    args:
      parent_message: null
      limit: 10
      offset: 0
      search_term: null
    outputs:
      messages_node2: result

  - name: Assert DM messages synced on both nodes
    type: assert
    statements:
      - "contains({{messages_node1}}, 'Hey Bob this is a DM!')"
      - "contains({{messages_node1}}, 'Hi Alice! Got your message.')"
      - "contains({{messages_node2}}, 'Hey Bob this is a DM!')"
      - "contains({{messages_node2}}, 'Hi Alice! Got your message.')"
      - "contains({{messages_node1}}, 'total_count')"

stop_all_nodes: true
restart: false
wait_timeout: 60
