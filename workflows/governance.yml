name: Curb — Governance & Inheritance (2F only on rc.35)
description: >
  Tests the explainer scenarios that don't require non-admin
  `create_context` (which is blocked on rc.35 — see
  non-admin-creates.yml). Specifically:

    2F — Admin creates an OPEN subgroup with a context inside.
         Non-admin (node-2), holding CAN_JOIN_OPEN_SUBGROUPS, joins
         the context via parent-walk inheritance. Both nodes exchange
         messages. Cross-asserts via WASM `get_messages`.

  Phase 2D (role promotion via `update_member_role`) and 2G
  (admin moderation via `remove_group_members`) attempted but fail
  opaquely on rc.35. Both will be revisited when a newer merod
  ships or after a deeper namespace-governance investigation.

  Pattern follows battleships' workflow:
    `create_namespace` → `create_group_in_namespace` (real subgroup)
    → `create_context` inside subgroup. This avoids the
    context-as-implicit-subgroup awkwardness curb's e2e.yml has.

  Cross-node assertions use WASM `call` + `outputs: result` only —
  admin-API list/info steps don't populate `dynamic_values` in a
  way `{{...}}` can reach (see e2e-v2.yml for the explanation).

force_pull_image: true

nodes:
  chain_id: testnet-1
  count: 2
  image: ghcr.io/calimero-network/merod:0.10.1-rc.37
  prefix: calimero-node

steps:
  # ── Bootstrap ───────────────────────────────────────────────────────────
  - name: Install application on Node 1
    type: install_application
    node: calimero-node-1
    path: "../logic/res/curb.wasm"
    dev: true
    outputs:
      app_id: applicationId

  - name: Install application on Node 2
    type: install_application
    node: calimero-node-2
    path: "../logic/res/curb.wasm"
    dev: true

  - name: Create namespace on Node 1
    type: create_namespace
    node: calimero-node-1
    application_id: "{{app_id}}"
    outputs:
      namespace_id: namespaceId

  # 15 = CREATE_CONTEXT | INVITE | JOIN_OPEN_SUBGROUPS | MANAGE_MEMBERS
  - name: Set default member capabilities
    type: set_default_capabilities
    node: calimero-node-1
    group_id: "{{namespace_id}}"
    capabilities: 15

  # ── Node 2 joins via invitation (only joining, never creating a context) ─
  - name: Generate identity for Node 2
    type: create_identity
    node: calimero-node-2
    outputs:
      bob_identity: publicKey

  - name: Wait for identity propagation
    type: wait
    seconds: 3

  - name: Node 1 creates invitation for Node 2
    type: create_namespace_invitation
    node: calimero-node-1
    group_id: "{{namespace_id}}"
    outputs:
      invite_bob: invitation

  - name: Node 2 joins namespace
    type: join_namespace
    node: calimero-node-2
    group_id: "{{namespace_id}}"
    invitation: "{{invite_bob}}"

  - name: Settle after namespace join
    type: wait
    seconds: 5

  # ── 2F: admin creates OPEN subgroup, non-admin inherits ────────────────
  - name: Admin creates an open subgroup
    type: create_group_in_namespace
    node: calimero-node-1
    namespace_id: "{{namespace_id}}"
    group_alias: "lounge"
    outputs:
      lounge_id: groupId

  - name: Mark lounge subgroup as Open
    type: set_subgroup_visibility
    node: calimero-node-1
    group_id: "{{lounge_id}}"
    visibility: open

  - name: Admin creates lounge channel context inside the subgroup
    type: create_context
    node: calimero-node-1
    application_id: "{{app_id}}"
    group_id: "{{lounge_id}}"
    params: '{"name": "lounge", "context_type": "Channel", "description": "open subgroup channel", "created_at": 1751954000}'
    outputs:
      lounge_ctx_id: contextId
      alice_lounge_key: memberPublicKey

  # Don't wait_for_sync on the new context yet — node-2 hasn't joined,
  # so its local hash is N/A (sync verification fails). join_context
  # itself should trigger node-2 to fetch state.
  - name: Settle after context creation
    type: wait
    seconds: 5

  # Non-admin node-2 joins the lounge context. With Open visibility
  # on the lounge subgroup AND node-2 holding CAN_JOIN_OPEN_SUBGROUPS
  # (granted by defaultCapabilities=15), parent-walk inheritance
  # should let join_context succeed.
  - name: Non-admin Node 2 joins lounge channel via inheritance
    type: join_context
    node: calimero-node-2
    context_id: "{{lounge_ctx_id}}"
    outputs:
      bob_lounge_key: memberPublicKey

  - name: Settle after non-admin join
    type: wait_for_sync
    context_id: "{{lounge_ctx_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2

  # CROSS-NODE WASM ASSERTION: bidirectional messaging in the open subgroup.
  - name: Alice sends in lounge
    type: call
    node: calimero-node-1
    context_id: "{{lounge_ctx_id}}"
    method: send_message
    args:
      message: "lounge from alice"
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751954010
      sender_username: Alice
      files: null
      images: null
    executor_public_key: "{{alice_lounge_key}}"

  - name: Bob sends in lounge
    type: call
    node: calimero-node-2
    context_id: "{{lounge_ctx_id}}"
    method: send_message
    args:
      message: "lounge from bob"
      mentions: []
      mentions_usernames: []
      parent_message: null
      timestamp: 1751954011
      sender_username: Bob
      files: null
      images: null
    executor_public_key: "{{bob_lounge_key}}"

  - name: Wait for lounge message sync
    type: wait_for_sync
    context_id: "{{lounge_ctx_id}}"
    nodes:
      - calimero-node-1
      - calimero-node-2

  - name: Node 1 reads lounge messages
    type: call
    node: calimero-node-1
    context_id: "{{lounge_ctx_id}}"
    method: get_messages
    args:
      start_position: 0
      limit: 50
      thread_parent_id: null
    executor_public_key: "{{alice_lounge_key}}"
    outputs:
      lounge_msgs_n1: result

  - name: Node 2 reads lounge messages
    type: call
    node: calimero-node-2
    context_id: "{{lounge_ctx_id}}"
    method: get_messages
    args:
      start_position: 0
      limit: 50
      thread_parent_id: null
    executor_public_key: "{{bob_lounge_key}}"
    outputs:
      lounge_msgs_n2: result

  - name: 2F — Assert open-subgroup CRDT sync (bidirectional)
    type: assert
    statements:
      - 'contains({{lounge_msgs_n1}}, "lounge from alice")'
      - 'contains({{lounge_msgs_n1}}, "lounge from bob")'
      - 'contains({{lounge_msgs_n2}}, "lounge from alice")'
      - 'contains({{lounge_msgs_n2}}, "lounge from bob")'

# 2D (role promotion via update_member_role) and 2G (admin moderation
# via remove_group_members) deferred to workflows-extra — both fail
# opaquely on rc.35. Need debugging against a newer merod or a separate
# investigation of the namespace governance code path.
